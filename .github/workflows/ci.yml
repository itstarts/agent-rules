name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash 语法检查
        run: bash -n install.sh
      - name: shellcheck
        run: shellcheck install.sh
      - name: Codex custom agent 校验
        run: python3 -B scripts/validate_codex_agents.py
      - name: Python 测试
        run: python3 -B -m unittest discover -s tests -p 'test_*.py'

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装冒烟测试(隔离 HOME)
        run: |
          set -euo pipefail
          TMP="$(mktemp -d)"
          run() { HOME="$TMP" ./install.sh "$@"; }

          echo "== 1. 首次安装 codex =="
          run codex
          [ "$(readlink "$TMP/.codex/AGENTS.md")" = "$PWD/AGENTS.md" ] || { echo "codex 软链未指向仓库源"; exit 1; }

          echo "== 2. 幂等重跑应跳过 =="
          out2="$(run codex)"
          echo "$out2"
          case "$out2" in *已就绪*) ;; *) echo "幂等重跑未识别已就绪"; exit 1;; esac

          echo "== 3. 未知工具名应非零退出 =="
          if HOME="$TMP" ./install.sh bogus-tool; then echo "未知工具名未触发非零退出"; exit 1; fi

          echo "== 4. 拒绝写入仓库内路径 =="
          if HOME="$PWD" ./install.sh codex 2>/dev/null; then echo "未拦截写入仓库内路径"; exit 1; fi

          rm -rf "$TMP"
          echo "全部冒烟用例通过 ✓"
